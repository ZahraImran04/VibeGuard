services:
  - type: web
    name: vibeguard
    runtime: python
    repo: https://github.com/YOUR_USERNAME/vibeguard
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
